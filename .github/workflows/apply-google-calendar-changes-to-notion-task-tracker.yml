name: Apply Google Calendar changes to Notion task tracker

on:
  repository_dispatch:
    types:
      - apply-google-calendar-changes-to-notion-task-tracker

concurrency:
  group: apply-google-calendar-changes-to-notion-task-tracker-${{ github.event.client_payload.tracker_user }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply Google Calendar changes to ${{ github.event.client_payload.tracker_user }} task tracker
    runs-on: ubuntu-latest
    environment: ${{ github.event.client_payload.tracker_user }}

    steps:
      - name: Check dispatch identity
        run: |
          test -n "$TRACKER_USER"
          test -n "$GOOGLE_CHANGE_CURSOR"
        env:
          TRACKER_USER: ${{ github.event.client_payload.tracker_user }}
          GOOGLE_CHANGE_CURSOR: ${{ github.event.client_payload.google_change_cursor }}

      - name: Check out tracker
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tracker
        run: python -m pip install .

      - name: Write tracker config
        run: |
          mkdir -p "$RUNNER_TEMP/ntt"
          printf '%s\n' "$NTT_CONFIG_TOML" > "$RUNNER_TEMP/ntt/config.toml"
        env:
          NTT_CONFIG_TOML: ${{ secrets.NTT_CONFIG_TOML }}

      - name: Build current tracker state from Notion
        run: ntt --refresh-notion-task-tracker --tracker-state-path "$RUNNER_TEMP/ntt/notion_tasks_tree.json"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml

      - name: Apply changed Google events to Notion tasks
        run: >-
          ntt --apply-google-calendar-changes-to-tasks
          --google-change-cursor "$GOOGLE_CHANGE_CURSOR"
          --tracker-user "$TRACKER_USER"
          --tracker-state-path "$RUNNER_TEMP/ntt/notion_tasks_tree.json"
        env:
          GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REFRESH_TOKEN: ${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_GOOGLE_CALENDAR_STATE_API_TOKEN: ${{ secrets.NTT_GOOGLE_CALENDAR_STATE_API_TOKEN }}
          NTT_GOOGLE_CALENDAR_STATE_API_URL: ${{ vars.NTT_GOOGLE_CALENDAR_STATE_API_URL }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml
          GOOGLE_CHANGE_CURSOR: ${{ github.event.client_payload.google_change_cursor }}
          TRACKER_USER: ${{ github.event.client_payload.tracker_user }}
