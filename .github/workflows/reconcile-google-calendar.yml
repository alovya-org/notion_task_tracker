name: Reconcile Google Calendar

on:
  repository_dispatch:
    types:
      - reconcile-google-calendar

concurrency:
  group: synchronise-notion-google-calendar-${{ github.event.client_payload.tracker_user }}
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile ${{ github.event.client_payload.tracker_user }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.client_payload.tracker_user }}

    steps:
      - name: Check dispatch identity
        run: |
          test -n "$TRACKER_USER"
          test -n "$SYNC_TOKEN"
        env:
          TRACKER_USER: ${{ github.event.client_payload.tracker_user }}
          SYNC_TOKEN: ${{ github.event.client_payload.sync_token }}

      - name: Check out tracker
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tracker
        run: python -m pip install .

      - name: Write tracker config
        run: |
          mkdir -p "$RUNNER_TEMP/ntt"
          printf '%s\n' "$NTT_CONFIG_TOML" > "$RUNNER_TEMP/ntt/config.toml"
        env:
          NTT_CONFIG_TOML: ${{ secrets.NTT_CONFIG_TOML }}

      - name: Build current tracker state from Notion
        run: ntt --reconcile-from-notion --tracker-state-path "$RUNNER_TEMP/ntt/notion_tasks_tree.json"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml

      - name: Reconcile changed Google events into Notion
        run: >-
          ntt --reconcile-calendar-changes
          --sync-token "$SYNC_TOKEN"
          --tracker-user "$TRACKER_USER"
          --tracker-state-path "$RUNNER_TEMP/ntt/notion_tasks_tree.json"
        env:
          GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REFRESH_TOKEN: ${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_CALENDAR_SYNC_ADMIN_TOKEN: ${{ secrets.NTT_CALENDAR_SYNC_ADMIN_TOKEN }}
          NTT_CALENDAR_SYNC_STATE_URL: ${{ vars.NTT_CALENDAR_SYNC_STATE_URL }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml
          SYNC_TOKEN: ${{ github.event.client_payload.sync_token }}
          TRACKER_USER: ${{ github.event.client_payload.tracker_user }}
