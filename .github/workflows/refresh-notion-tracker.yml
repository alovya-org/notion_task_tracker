name: Project Notion tasks into Google Calendar

on:
  workflow_dispatch:
    inputs:
      tracker_user:
        description: GitHub environment that owns the tracker secrets
        required: true
        type: string
  repository_dispatch:
    types:
      - refresh-notion-tracker

concurrency:
  group: refresh-notion-tracker-${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}
  cancel-in-progress: true

jobs:
  project:
    name: Project ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }} tasks
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}

    steps:
      - name: Check tracker user
        run: |
          test -n "$TRACKER_USER"
        env:
          TRACKER_USER: ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}

      - name: Check out tracker
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tracker
        run: python -m pip install .

      - name: Write tracker config
        run: |
          mkdir -p "$RUNNER_TEMP/ntt"
          printf '%s\n' "$NTT_CONFIG_TOML" > "$RUNNER_TEMP/ntt/config.toml"
        env:
          NTT_CONFIG_TOML: ${{ secrets.NTT_CONFIG_TOML }}

      - name: Project current Notion tasks into Google Calendar
        run: ntt --project-calendar --tracker-state-path "$RUNNER_TEMP/ntt/notion_tasks_tree.json"
        env:
          GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REFRESH_TOKEN: ${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml
