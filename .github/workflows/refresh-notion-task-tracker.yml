name: Wake two-way Notion and Google Calendar synchronisation

on:
  workflow_dispatch:
    inputs:
      tracker_user:
        description: GitHub environment that owns the tracker secrets
        required: true
        type: string
  repository_dispatch:
    types:
      - refresh-notion-task-tracker
      - apply-google-calendar-changes-to-notion-task-tracker

concurrency:
  group: synchronise-notion-and-google-calendar-${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  synchronise:
    name: Run complete lifecycle after ${{ github.event.action || 'manual' }} wake-up
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}

    steps:
      - name: Check tracker user
        run: |
          test -n "$TRACKER_USER"
        env:
          TRACKER_USER: ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}

      - name: Check out tracker
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tracker
        run: python -m pip install .

      - name: Write tracker config
        run: |
          mkdir -p "$RUNNER_TEMP/ntt"
          printf '%s\n' "$NTT_CONFIG_TOML" > "$RUNNER_TEMP/ntt/config.toml"
        env:
          NTT_CONFIG_TOML: ${{ secrets.NTT_CONFIG_TOML }}

      - name: Synchronise Notion tasks with Google Calendar
        run: >-
          ntt --synchronise-notion-task-tracker-with-google-calendar
          --tracker-user "$TRACKER_USER"
        env:
          GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REFRESH_TOKEN: ${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTT_GOOGLE_CALENDAR_STATE_API_TOKEN: ${{ secrets.NTT_GOOGLE_CALENDAR_STATE_API_TOKEN }}
          NTT_GOOGLE_CALENDAR_STATE_API_URL: ${{ vars.NTT_GOOGLE_CALENDAR_STATE_API_URL }}
          NTT_CONFIG_PATH: ${{ runner.temp }}/ntt/config.toml
          TRACKER_USER: ${{ github.event.inputs.tracker_user || github.event.client_payload.tracker_user }}

  report-failure:
    name: Report synchronisation failure
    if: ${{ always() && needs.synchronise.result == 'failure' }}
    needs: synchronise
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Create actionable failure issue
        run: >-
          gh issue create
          --title "Google Calendar synchronisation failed in run $GITHUB_RUN_ID"
          --body "Inspect the failed workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
